<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Still Life Coding</title>
    <style>
        main {
            border: 1px solid black;
            width: 90vw;
            height: 90vh;
            position: relative;
        }
      .box {
        width: 200px;
        height: 200px;  
      }
       
      #flowers-container {
            border: 0.5px solid rgba(49, 49, 73, 0);
            position: absolute;
            bottom: 50px;
            left: 415px;
            z-index: 1;
            width: 145px;
            height: 330px;
            overflow: visible
        }
        #vase {
            width: 100%;
            height: 100%;
            background-color: rgba(146, 155, 197, 0.822);
            position: absolute;
            bottom: 0%;
            z-index: 10;
            opacity: 0.4;
        }
        .flowers {
            width: 200px;
            height: 200px;
            top: -240px;
            left: 80px;
            background-color: rgb(235, 207, 0);
            clip-path: polygon(34% 92%, 25% 84%, 16% 72%, 
            11% 59%, 9% 45%, 9% 31%, 16% 21%, 24% 18%, 29% 21%, 
            34% 25%, 41% 29%, 49% 31%, 55% 34%, 59% 41%, 62% 47%,
             67% 50%, 71% 51%, 77% 53%, 84% 57%, 88% 64%, 86% 70%, 80% 80%,
              65% 89%, 49% 93%);
            border-radius: 50%;
            position: absolute;
            z-index: 20;
            
        }
        #flowers1 {
            width: 195px;
            height: 195px;
            top: -200px;
            left: 50px;
            background-color: rgb(255, 230, 0);
            clip-path: polygon(34% 92%, 25% 84%, 16% 72%, 
            11% 59%, 9% 45%, 9% 31%, 16% 21%, 24% 18%, 29% 21%, 
            34% 25%, 41% 29%, 49% 31%, 55% 34%, 59% 41%, 62% 47%,
             67% 50%, 71% 51%, 77% 53%, 84% 57%, 88% 64%, 86% 70%, 80% 80%,
              65% 89%, 49% 93%);
            border-radius: 50%;
            position: absolute;
            z-index: 20;
            transform:rotate(-10deg);
            transform-origin:bottom center;
        }
        .stem {
            width: 10px;
            height: 450px;
            background-color: green;
            position: absolute;
            left: 40px;
            top: -120px;
            transform: rotate(15deg);
            transform-origin: bottom center; 
        }
        #stem1 {
            width: 10px;
            height: 400px;
            background-color: green;
            position: absolute;
            left: 40px;
            top: -70px;
            transform: rotate(11deg);
            transform-origin: bottom center; 
        }
        #apple {
            width: 150px;
            height: 150px;
            background: linear-gradient(90deg,rgba(61, 9, 9, 1) 3%, 
            rgba(140, 29, 29, 1) 51%,
             rgba(237, 221, 83, 1) 85%);
            clip-path: polygon(48% 10%, 25% 9%, 10% 17%,
             3% 30%, 1% 48%, 4% 66%, 12% 78%, 30% 95%,
             44% 95%, 53% 95%, 70% 96%, 83% 84%, 94% 71%,
              99% 50%, 99% 28%, 87% 11%, 66% 6%);
            border-radius: 50%;
            position: absolute;
            bottom: 5%;
            right: 520px;
            z-index: 10;
        }

        #apple1 {
            width: 150px;
            height: 150px;
            background: #EDDD53;
            background: linear-gradient(90deg,rgba(237, 221, 83, 1) 0%, rgba(183, 107, 71, 1) 58%, rgba(155, 46, 42, 1) 85%);
            clip-path: polygon(26% 6%, 39% 8%, 53% 13%, 69% 11%, 
            82% 13%, 93% 22%, 99% 36%, 98% 51%, 92% 66%, 86% 78%,
             78% 89%, 70% 95%, 62% 99%, 51% 98%, 37% 96%, 27% 97%, 18% 93%,
             9% 79%, 2% 62%, 0 46%, 0 35%, 3% 22%, 13% 11%);
            border-radius: 50%;
            position: absolute;
            bottom: 3%;
            right: 630px;
            z-index: 10;
        }
         #bottle {
            width: 300px;
            height: 330px;
            background-color: rgb(25, 3, 106);
            clip-path: polygon(26% 99%, 27% 71%, 29% 55%,
             38% 42%, 41% 6%, 55% 6%, 55% 41%,
              63% 53%, 64% 68%, 64% 99%);
            opacity: 100%;
            border-radius: 10px;
            position: absolute;
            bottom: 10%;
            right: 487px;
            z-index: 1;
        }
        #pinneapple {
            width: 370px;
            height: 400px;
            background: linear-gradient(90deg,
             rgb(97, 87, 60) 0%, rgb(177, 141, 78)
              50%, rgb(197, 151, 59) 100%);
            clip-path: polygon(37% 96%, 28% 88%, 23% 77%, 20% 64%,
             19% 51%, 20% 38%, 22% 26%, 25% 17%, 31% 11%, 39% 9%, 47% 11%,
              52% 9%, 59% 9%, 65% 9%, 75% 13%, 81% 24%, 85% 36%, 87% 48%,
               87% 61%, 85% 73%, 82% 85%, 76% 94%, 65% 96%, 51% 96%);
            border-radius: 20px;
            position: absolute;
            bottom: 3%;
            right: 690px;
            z-index: 1;
        }
        #pinneapplecrown {
            width: 300px;
            height: 300px;
            background-color: rgb(73, 97, 73);
            clip-path: polygon(37% 96%, 28% 88%, 26% 79%, 3% 55%,
             29% 63%, 8% 28%, 21% 37%, 21% 4%, 36% 39%, 36% 0, 46% 25%,
              55% 36%, 57% 4%, 67% 40%, 75% 13%, 76% 41%, 84% 23%, 77% 54%,
             90% 40%, 84% 69%, 79% 81%, 76% 94%, 65% 98%, 52% 99%);
            border-radius: 50%;
            position: absolute;
            bottom: 46%;
            right: 735px;
            z-index: 2;
        }
       
        #table{
            width: 100%;
            height: 100px;
            background-color: rgb(194, 196, 74);
            position: absolute;
            bottom: 0;
        }
        #scene{
            width: 100%;
            height: 100%;
            background-color: rgb(249, 236, 180);
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }


    </style>
</head>
<body>
    <main>
 <div  id="flowers-container">
    <div class="flowers"></div>
        <div id="flowers1"></div>
     <div class="stem"></div>
     <div id="stem1"></div>
     <div id="vase"></div>
</div>

<div id="scene"></div>
<div id="apple"></div>
<div id="apple1"></div>
 <div  id="bottle"></div>
 <div id="table"></div>
 <div id="pinneapple"></div>
    <div id="pinneapplecrown"></div>
    </main>
</body>
</html>
