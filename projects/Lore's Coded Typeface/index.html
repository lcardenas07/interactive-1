<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodedAlphabet</title>
    <link rel="stylesheet" href="CodedAlphabet.css">
</head>
<body>

     <div class="alphabet">

    <!-- A -->
    <div class="letter letter-a">
      <div class="shape a-cut1 cut"></div>
      <div class="shape a-cut2 cut"></div>
      <div class="shape a-rect1"></div>
      <div class="shape a-rect2"></div>
      <div class="shape a-half"></div>
      <div class="shape a-circle"></div>

    </div>

  <!-- B -->
    <div class="letter letter-b">
      <div class="shape b-stem"></div>
      <div class="shape b-top"></div>
      <div class="shape b-bottom"></div>

      <!-- cutouts -->
      <div class="shape b-cut-top cut"></div>
      <div class="shape b-cut-bottom cut"></div>
      </div>

<!-- C -->
    <div class="letter letter-c">
      <div class="shape c-arc"></div>
      <div class="shape c-cut cut"></div>
   </div>

<!-- D -->
    <div class="letter letter-d">
      <div class="shape d-stem"></div>
      <div class="shape d-arc"></div>

      <!-- cutout -->
      <div class="shape d-cut cut"></div>
    </div>
    
<!-- E -->
    <div class="letter letter-e">
      <div class="shape e-rects"></div>
      <div class="shape e-cut1 cut"></div>
       <div class="shape e-cut2 cut"></div>
      <div class="shape e-cut3 cut"></div>
     </div>

<!-- F -->
    <div class="letter letter-f">
      <div class="shape f-rects"></div>
      <div class="shape f-rects1"></div>
      <div class="shape f-cut1 cut"></div>
      <div class="shape f-cut2 cut"></div>
      <div class="shape f-cut3 cut"></div>
    </div>

<!-- G -->
    <div class="letter letter-g">
      <div class="shape g-arc"></div>
      <div class="shape g-cut1 cut"></div>
      <div class="shape g-cut2 cut"></div>    
      <div class="shape g-cut3 cut"></div>
  </div>

<!-- H -->
    <div class="letter letter-h">
      <div class="shape h-rects1"></div>  
      <div class="shape h-rects2"></div>
      <div class="shape h-rects3"></div>
      <div class="shape h-cut1 cut"></div>
      <div class="shape h-cut2 cut"></div> 
      </div>
<!-- I -->
    <div class="letter letter-i">
      <div class="shape i-rects1"></div>  
      <div class="shape i-cut1 cut"></div>
      </div>

<!-- J -->
    <div class="letter letter-j">
      <div class="shape j-rects1"></div>
      <div class="shape j-rects2"></div>
      <div class="shape j-arc"></div>
      <!-- cutouts :,v -->
      <div class="shape j-cut1 cut"></div>
      <div class="shape j-cut2 cut"> </div>
    </div>

    </div>
</body>
</html>
